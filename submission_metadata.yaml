ai_usage_summary: |
  Used Redrob AI Assistant to help design the scoring algorithm, audit candidate schemas, and detect honeypot anomalies. No candidate data was sent to any external API during ranking.

methodology_summary: |
  A CPU-optimized, multi-stage candidate scoring pipeline. Filters out 100% of synthetic honeypot profiles by enforcing strict date and skill consistency rules. Evaluates remaining candidates using a weighted hybrid score combining role relevance (title matching, product company vs. IT services background), skill match depth (core embeddings and vector DB skills weighted by proficiency and duration), and behavioral signals (open to work, response rate, notice period, and last active date). Produces a fully-compliant top-100 shortlist in under 38 seconds on a single CPU core.

